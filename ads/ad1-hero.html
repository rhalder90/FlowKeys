<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
  }

  .label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #86868b;
    margin-bottom: 32px;
  }

  h1 {
    font-size: 72px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -1px;
    line-height: 1.05;
    margin-bottom: 28px;
  }

  .tagline {
    font-size: 28px;
    font-weight: 400;
    color: #86868b;
    line-height: 1.45;
    max-width: 600px;
  }

  .keys {
    margin-top: 48px;
    font-size: 64px;
    letter-spacing: 12px;
  }

  .bottom {
    position: absolute;
    bottom: 60px;
    font-size: 15px;
    color: #c7c7cc;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <div class="label">Introducing</div>
  <h1>FlowKeys</h1>
  <p class="tagline">Mechanical keyboard sounds<br>for your Mac.</p>
  <div class="keys">&#9000;</div>
  <div class="bottom">Free &amp; Open Source</div>
</body>
</html>
