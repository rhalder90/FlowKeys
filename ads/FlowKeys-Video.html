<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* ——— Scene 1: Title (0s – 3s) ——— */
  .scene1 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: scene1 10s ease forwards;
  }

  @keyframes scene1 {
    0%   { opacity: 0; }
    3%   { opacity: 1; }
    25%  { opacity: 1; }
    30%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .scene1 .label {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #86868b;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .scene1 h1 {
    font-size: 96px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: -2px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.6s forwards;
  }

  .scene1 .tagline {
    font-size: 28px;
    color: #86868b;
    margin-top: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.9s forwards;
  }

  /* ——— Scene 2: Cost comparison (3s – 6s) ——— */
  .scene2 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    opacity: 0;
    animation: scene2 10s ease forwards;
  }

  @keyframes scene2 {
    0%   { opacity: 0; }
    28%  { opacity: 0; }
    33%  { opacity: 1; }
    55%  { opacity: 1; }
    60%  { opacity: 0; }
    100% { opacity: 0; }
  }

  .scene2 .cost-row {
    display: flex;
    align-items: center;
    gap: 40px;
  }

  .scene2 .cost-card {
    width: 340px;
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    opacity: 0;
  }

  .scene2 .cost-card.kb {
    background: #f5f5f7;
    animation: slideLeft 0.7s ease 3.3s forwards;
  }

  .scene2 .cost-card.fk {
    background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
    color: #fff;
    animation: slideRight 0.7s ease 3.6s forwards;
  }

  .scene2 .cost-card h4 {
    font-size: 15px;
    font-weight: 600;
    color: #86868b;
    margin-bottom: 10px;
  }

  .scene2 .cost-card.fk h4 { color: rgba(255,255,255,0.7); }

  .scene2 .cost-card .price {
    font-size: 56px;
    font-weight: 700;
    color: #1d1d1f;
  }

  .scene2 .cost-card.fk .price { color: #fff; }

  .scene2 .vs {
    font-size: 18px;
    font-weight: 700;
    color: #c7c7cc;
    opacity: 0;
    animation: fadeIn 0.4s ease 3.9s forwards;
  }

  /* ——— Scene 3: Features + CTA (6s – 10s) ——— */
  .scene3 {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 48px;
    opacity: 0;
    animation: scene3 10s ease forwards;
  }

  @keyframes scene3 {
    0%   { opacity: 0; }
    58%  { opacity: 0; }
    63%  { opacity: 1; }
    95%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .scene3 .features {
    display: flex;
    gap: 24px;
  }

  .scene3 .feat {
    width: 200px;
    background: #f5f5f7;
    border-radius: 20px;
    padding: 32px 20px;
    text-align: center;
    opacity: 0;
  }

  .scene3 .feat:nth-child(1) { animation: scaleIn 0.5s ease 6.3s forwards; }
  .scene3 .feat:nth-child(2) { animation: scaleIn 0.5s ease 6.5s forwards; }
  .scene3 .feat:nth-child(3) { animation: scaleIn 0.5s ease 6.7s forwards; }
  .scene3 .feat:nth-child(4) { animation: scaleIn 0.5s ease 6.9s forwards; }

  .scene3 .feat h4 {
    font-size: 18px;
    font-weight: 600;
    color: #1d1d1f;
    margin-bottom: 6px;
  }

  .scene3 .feat p {
    font-size: 13px;
    color: #86868b;
  }

  .scene3 .cta-block {
    text-align: center;
    opacity: 0;
    animation: fadeUp 0.7s ease 7.3s forwards;
  }

  .scene3 .cta-block h2 {
    font-size: 40px;
    font-weight: 700;
    color: #1d1d1f;
    margin-bottom: 8px;
  }

  .scene3 .cta-block p {
    font-size: 20px;
    color: #86868b;
  }

  /* ——— Shared Animations ——— */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes slideLeft {
    from { opacity: 0; transform: translateX(-40px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes slideRight {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.85); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ——— Progress bar at bottom ——— */
  .progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 4px;
    background: linear-gradient(90deg, #007aff, #5856d6);
    animation: progressBar 10s linear forwards;
  }

  @keyframes progressBar {
    from { width: 0; }
    to   { width: 100%; }
  }
</style>
</head>
<body>

  <!-- Scene 1: Title reveal (0–3s) -->
  <div class="scene1">
    <div class="label">Introducing</div>
    <h1>FlowKeys</h1>
    <p class="tagline">Mechanical keyboard sounds for your Mac.</p>
  </div>

  <!-- Scene 2: Cost comparison (3–6s) -->
  <div class="scene2">
    <div class="cost-row">
      <div class="cost-card kb">
        <h4>Mechanical Keyboard</h4>
        <div class="price">$300</div>
      </div>
      <div class="vs">vs</div>
      <div class="cost-card fk">
        <h4>FlowKeys</h4>
        <div class="price">Free</div>
      </div>
    </div>
  </div>

  <!-- Scene 3: Features + CTA (6–10s) -->
  <div class="scene3">
    <div class="features">
      <div class="feat">
        <h4>Instant</h4>
        <p>12ms latency</p>
      </div>
      <div class="feat">
        <h4>Two Sounds</h4>
        <p>Mech or Soft</p>
      </div>
      <div class="feat">
        <h4>Automatic</h4>
        <p>Starts on boot</p>
      </div>
      <div class="feat">
        <h4>Free</h4>
        <p>Open source</p>
      </div>
    </div>
    <div class="cta-block">
      <h2>FlowKeys</h2>
      <p>Get into the flow.</p>
    </div>
  </div>

  <!-- Progress bar -->
  <div class="progress"></div>

</body>
</html>
