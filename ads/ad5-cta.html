<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #1d1d1f;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
  }

  h1 {
    font-size: 80px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -1px;
    margin-bottom: 24px;
  }

  .tagline {
    font-size: 28px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 64px;
    line-height: 1.45;
  }

  .pills {
    display: flex;
    gap: 16px;
    margin-bottom: 64px;
  }

  .pill {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 40px;
    padding: 14px 28px;
    font-size: 17px;
    font-weight: 500;
    color: rgba(255,255,255,0.7);
  }

  .cta {
    font-size: 22px;
    font-weight: 500;
    color: #ffffff;
    margin-bottom: 12px;
  }

  .sub {
    font-size: 16px;
    color: rgba(255,255,255,0.3);
  }

  .email {
    position: absolute;
    bottom: 48px;
    font-size: 15px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>
  <h1>FlowKeys</h1>
  <p class="tagline">Get into the flow.</p>
  <div class="pills">
    <div class="pill">Free</div>
    <div class="pill">Open Source</div>
    <div class="pill">Mac Only</div>
  </div>
  <p class="cta">github.com/rhalder90/FlowKeys</p>
  <p class="sub">One command to install. One command to uninstall.</p>
</body>
</html>
