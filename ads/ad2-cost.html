<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1080px;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px;
  }

  .top-label {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #86868b;
    margin-bottom: 48px;
  }

  .comparison {
    display: flex;
    gap: 40px;
    align-items: center;
    margin-bottom: 56px;
  }

  .card {
    width: 340px;
    border-radius: 24px;
    padding: 48px 32px;
  }

  .card.left {
    background: #f5f5f7;
  }

  .card.right {
    background: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
    color: #ffffff;
  }

  .card .icon { font-size: 48px; margin-bottom: 16px; }

  .card h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #1d1d1f;
  }

  .card.right h3 { color: rgba(255,255,255,0.85); }

  .card .price {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -1px;
    color: #1d1d1f;
  }

  .card.right .price { color: #ffffff; }

  .card .sub {
    font-size: 15px;
    color: #86868b;
    margin-top: 8px;
  }

  .card.right .sub { color: rgba(255,255,255,0.6); }

  .vs {
    font-size: 20px;
    font-weight: 700;
    color: #c7c7cc;
  }

  .bottom-text {
    font-size: 24px;
    font-weight: 500;
    color: #1d1d1f;
    line-height: 1.4;
  }

  .brand {
    position: absolute;
    bottom: 48px;
    font-size: 18px;
    font-weight: 600;
    color: #1d1d1f;
    letter-spacing: -0.3px;
  }
</style>
</head>
<body>
  <div class="top-label">The Sound You Love</div>
  <div class="comparison">
    <div class="card left">
      <div class="icon">&#9000;</div>
      <h3>Mechanical Keyboard</h3>
      <div class="price">$300</div>
      <div class="sub">Plus desk space and cables</div>
    </div>
    <div class="vs">vs</div>
    <div class="card right">
      <div class="icon">&#10024;</div>
      <h3>FlowKeys</h3>
      <div class="price">Free</div>
      <div class="sub">Same sound. Zero cost.</div>
    </div>
  </div>
  <p class="bottom-text">Same satisfying click.<br>On the Mac you already own.</p>
  <div class="brand">FlowKeys</div>
</body>
</html>
